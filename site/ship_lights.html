    <img src='../media/content/boatlights_anchor.jpg' alt='a potato-shaped sailboat laying at anchor'>
    <img src='../media/content/boatlights_sailing.jpg' alt='navigation lights states for sailboats that are under sail(sidelights with stern light, tricolor mastlight only for boats under 12 m), when motor-sailing(sidelights, steaming light, stern light), under 7m(an all-around light, or a hand torch, and if possible sidelights and a stern light), and at anchor(a masthead light).'>
    <img src='../media/content/boatlights_powerdown.gif' alt='navigation lights states for power driven boats under 50m, while underway(sidelights, mastheadlight and sternlight), and at anchor(mastheadlight). There is also light states for a pilot boat underway(sidelights, sternlight, and 2 lights one over the other with the bottom being red and top one being white) and at anchor(masthead light, and a white light over a red light), and for a hovercraft underway(sidelights, sternlight, masthead light with a flashing yellow light).'>
    <img src='../media/content/boatlights_powerup.jpg' alt='navigation lights states for ships that are 50 m and over, underway(white light ahead, masthead light, sidelights, sternlight) and at anchor(white light ahead, stern light). There are also light states for a big vessel that is underway with a constrained draft(3 red lights one over the other, masthead light, sternlight, light at bow), and vessels not under command that are underway(2 red lights one over the other, sidelights, sternlight and light at bow) and not moving(2 red lights over the other).'>
    <img src='../media/content/boatlights_towing.jpg' alt='navigation lights states for boats under 50m, one for a tow under 200m(tugboat has sidelights, 2 white lights high up, a yellow towing light at the back over the sternlight and the tow has sidelights and a sternlight) and another for tow over 200m(the tugboat has 3 white lights, sidelights, a yellow towing light overtop of a stern light and the towed object has sidelights and a sternlight). Another graphic showing navigation light configurations for tugboats towing inconspicuous objects, when the object being towed is under 200m(the tugboat has 2 white lights, sidelights, a yellow towing light overtop of a stern light and the towed object has a light at the bow and at the stern), and over 200m(the tugboat has 3 white lights, sidelights, a yellow towing light overtop of a stern light and the towed object has a light at the bow and at the stern), there are also different light states showing objects of different lengths, under 100m(the tugboat has 3 white lights, sidelights, a yellow towing light overtop of a stern light and the towed object has a light at the stern, at the bow and in the center), over 100m, and wider than 25m(the tugboat has 3 white lights, sidelights, a yellow towing light overtop of a stern light and the towed object has lights on the stern and bow and on both sides in the center). Another graphic shows tugboats towing other ships, either alongside(the tugboat has sidelights, a stern light and 2 lights overhead and is towing a barge alongside that is lit with sidelights and a stern light), by pushing(the tugboat has sidelights, a stern light and 2 lights overhead and is pushing a big ship from the stern that is lit with sidelights, a masthead light, a light at the bow and a stern light), or by pushing as a composite(in which the pushing boat and boat being pushed are considered to be one vessel, and are lit as such. The pushing vessel has a stern light and the vessel being pushed as a light at the bow, a masthead ight and sidelights).'>
    <img src='../media/content/boatlights_trawling.jpg' alt='Graphics showing trawling vessels and their different navigation light states. Trawling boat under 50m, underway(a trawler lit with sidelights, a green light over a white light, and a stern light) and not moving(a trawler lit with a green light over a white light). Vessels over 50m not moving(a trawler lit with a green light over a white light, and a masthead light) and underwaya trawler lit with sidelights, a green light over a white light, a stern light and a masthead light). Fishing vessels with gear 150m to starboard, or port(red over white light, a white light in the direction of the fishing gear and sidelights and a sternlight-only when moving), and states for non-trawling fishing boats that are moving(a red light over a white and red light, a stern light, and sidelights) and not moving(red over white light).'>
    <img src='../media/content/boatlights_restricted.jpg' alt='Boats with navigation lights describing restricted movement, one showing a boat that is underway but limited in its movements(lights red, white and red, with sidelights, a masthead light and a stern light), another showing a tugboat towing something in a way that it is not able to change its route(red over white and red, higher are 2 additional white lights, then there are sidelights, and a yellow towing light over a stern light), a vessel engaged in underwater operations with obstacles to starboard(a boat with 3 lights ordered as red, white and red, a masthead light, 2 superimposed green lights indicating where it is safe for boats to pass and 2 superimposed red lights indicating the side with an obstruction), and a small diving boat under 7m(3 lights ordered as such: red, white and red again).'>
    <img src='../media/content/boatlights_aground.jpg' alt='Vessels with navigation lights showing that they are aground(2 superimposed red lights, and anchor light), one under 50m(2 superimposed red lights, anchor lights at stern and at the bow) the other over 50m.'>
